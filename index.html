<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>slow life</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f0e8;
      color: #3a3a3a;
      font-family: 'Georgia', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 3rem;
      font-weight: normal;
      letter-spacing: 0.3em;
      color: #5a5a5a;
      margin-bottom: 20px;
    }

    .line {
      width: 60px;
      height: 1px;
      background-color: #b0a090;
      margin: 0 auto 24px;
    }

    p {
      font-size: 1.1rem;
      line-height: 2;
      color: #7a7a7a;
      max-width: 400px;
    }

    .time {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #b0a090;
      letter-spacing: 0.1em;
    }

    .sloth-btn {
      margin-top: 32px;
      padding: 12px 28px;
      background-color: #c8b89a;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background-color 0.3s;
    }

    .sloth-btn:hover {
      background-color: #a8987a;
    }

    .sloth-img {
      margin-top: 28px;
      display: none;
      width: 280px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>slow life</h1>
    <div class="line"></div>
    <p>서두르지 않아도 괜찮아요.<br>오늘 하루도 천천히, 나답게.</p>
    <div class="time" id="time"></div>
    <button class="sloth-btn" onclick="showSloth()">🦥 나무늘보 보기</button>
    <br>
    <img class="sloth-img" id="slothImg" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Bradypus.jpg/400px-Bradypus.jpg" alt="나무늘보">
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const options = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
      document.getElementById('time').textContent = now.toLocaleTimeString('ko-KR', options);
    }
    updateTime();
    setInterval(updateTime, 1000);

    function showSloth() {
      const img = document.getElementById('slothImg');
      img.style.display = img.style.display === 'inline' ? 'none' : 'inline';
    }
  </script>
</body>
</html>
